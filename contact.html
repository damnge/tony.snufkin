  <title>Damian Grela — Contact</title>

<body>
<section class="page-container" id="page-container">
  <header class="header" id="header">
    <a href="index"><img class="logo animate__animated animate__fadeIn" src="LOGO.svg" alt="logo"></a>
    <div class="back"><a href="index">Back</a></div>
  </header>
  <section class="form-container" id="form-container">
    <h1 class="contact-title">let's get in touch.</h1>
    <form class="contact-form" name="myForm" action="https://formspree.io/f/moqpzlzj" method="POST" id="my-form">
      <label for="name">Name</label>
      <input type="text"  name="name" id="name">
      <label for="Email">Email</label>
      <input type="email" name="mail" id="Email">
      <label for="message">Message</label>
      <textarea name="message" id="message"></textarea>
      <div id="status" class="animate__animated animate__fadeIn animate__delay-2s"></div>
      <div class="center-btn">
        <button class="btn-send" type="submit">Send</button>
      </div>
    </form>
  </section>
</section>
